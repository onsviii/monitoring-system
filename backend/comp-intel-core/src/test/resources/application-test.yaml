spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

groq:
  api-url: https://api.groq.com/openai/v1/chat/completions
  api-key: test-key
  model: test-model

firebase:
  credentials-path: test-credentials-path

google:
  places:
    api-key: test-key
    text-search-url: https://places.googleapis.com/v1/places:searchText
    details-url: https://places.googleapis.com/v1/places/%s

ml-service:
  base-url: http://localhost:8001
