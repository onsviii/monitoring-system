server:
  port: 8080

spring:
  application:
    name: comp-intel-core

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bkr_monitor}
    username: ${DB_USERNAME:bkr_user}
    password: ${DB_PASSWORD:bkr_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 10
      thread-name-prefix: pipeline-

groq:
  url: https://api.groq.com/openai/v1/chat/completions
  api-key: ${GROQ_API_KEY}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    text-search-url: https://places.googleapis.com/v1/places:searchText
    place-details-url: https://places.googleapis.com/v1/places/%s


ml-service:
  base-url: ${ML_SERVICE_URL:http://localhost:8001}

logging:
  level:
    root: INFO
    ua.bkr.monitor: DEBUG
    ua.bkr.monitor.client: DEBUG
    org.hibernate.SQL: WARN